<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Bonito | Polirrubro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Tus estilos personalizados -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- SECCIÓN SUPERIOR: Logo Centrado -->
    <div class="logo-container text-center py-4">
        <a href="/">
            <!-- Si tenés el logo en imagen, usás esta línea (ej: logo.png en static/img/) -->
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Todo Bonito" class="logo-img">
            <h1 class="display-4 my-0 fw-bold" style="color: var(--marron-oscuro); font-style: italic;">Todo Bonito</h1>
            <p class="text-uppercase small tracking-widest text-muted mb-0" style="font-family: var(--fuente-cuerpo); letter-spacing: 3px;">🌸 Polirrubro & Deco 🌸</p>
        </a>
    </div>

    <!-- Menú de Navegación Sofisticado -->
    <nav class="navbar navbar-expand-lg navbar-custom shadow-sm sticky-top">
        <div class="container">
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav mx-auto text-center">
                    <a class="nav-link px-3" href="/">Inicio</a>
                    <a class="nav-link px-3" href="#rubros">Rubros</a>
                    <a class="nav-link px-3" href="/contacto">Contacto</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido Dinámico -->
    <div class="container my-5 flex-grow-1">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Pie de página -->
    <footer class="text-center py-4 mt-auto">
        <p class="mb-0 text-uppercase fw-light">&copy; 2026 Todo Bonito. Hecho con amor 🌸</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
