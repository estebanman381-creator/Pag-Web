{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 bg-white p-4 rounded shadow-sm border">
        <h2 class="mb-4 text-center">Escribinos</h2>
        <form action="/contacto" method="POST">
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Juan Pérez">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="juan@ejemplo.com">
            </div>
            <div class="mb-3">
                <label for="mensaje" class="form-label">¿En qué podemos ayudarte?</label>
                <textarea class="form-control" id="mensaje" name="mensaje" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar Mensaje</button>
        </form>
    </div>
</div>
{% endblock %}
