{% extends 'base.html' %}

{% block content %}
<div class="row mt-4">
    <!-- Formulario de Carga Izquierdo -->
    <div class="col-md-4 mb-4">
        <div class="p-4 bg-white rounded-3 border shadow-sm" style="border-radius: 15px !important;">
            <h4 class="fw-bold mb-3" style="color: var(--marron-oscuro);">🌸 Cargar Producto</h4>
            <form action="/admin" method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Nombre del Artículo</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej: Botella Térmica Pastel" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Precio ($)</label>
                    <input type="number" step="0.01" name="precio" class="form-control" placeholder="0.00" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Categoría / Rubro</label>
                    <select name="categoria" class="form-select" required>
                        <option value="libreria">✏️ Librería</option>
                        <option value="bazar">🍽️ Bazar</option>
                        <option value="jugueteria">🧸 Juguetería</option>
                        <option value="botellas">🥤 Botellas Térmicas</option>
                        <option value="mate">🧉 Mundo Mate</option>
                        <option value="maquillaje">💄 Maquillaje y más</option>
                        <option value="bijuteria">💍 Bijutería</option>
                        <option value="regaleria">🎁 Regalería</option>
                        <option value="cotillon">🎉 Cotillón</option>
                        <option value="otros">✨ Otros Artículos</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Descripción Corta</label>
                    <textarea name="descripcion" class="form-control" rows="2" placeholder="Detalles, colores, etc..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Foto Real</label>
                    <input type="file" name="foto" class="form-control" accept="image/*">
                </div>
                <button type="submit" class="btn btn-bonito w-100 py-2">Guardar Producto</button>
            </form>
        </div>
    </div>

    <!-- Tabla Derecha de Control de lo cargado -->
    <div class="col-md-8">
        <div class="p-4 bg-white rounded-3 border shadow-sm" style="border-radius: 15px !important;">
            <h4 class="fw-bold mb-3" style="color: var(--marron-oscuro);">📦 Stock en Base de Datos</h4>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in productos %}
                        <tr>
                            <td><img src="{{ p.imagen_url }}" width="45" height="45" class="rounded shadow-sm" style="object-fit: cover;"></td>
                            <td class="fw-bold" style="font-family: var(--fuente-cuerpo);">{{ p.titulo }}</td>
                            <td><span class="badge bg-light text-dark border">{{ p.categoria }}</span></td>
                            <td class="fw-bold" style="color: var(--marron-suave);">${{ p.precio }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">No hay productos cargados todavía. ¡Empezá usando el formulario!</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
