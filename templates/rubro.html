{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold" style="color: var(--marron-oscuro);">{{ categoria_titulo }}</h2>
        <div style="width: 50px; height: 2px; background-color: var(--rosa-oscuro); margin: 15px auto;"></div>
    </div>

    <div class="row g-4 justify-content-center">
        
        {% for producto in productos %}
        <!-- Imagen cliqueable con icono de lupa al pasar el mouse -->
            <div class="position-relative overflow-hidden" style="border-radius: 10px 10px 0 0;">
                <a href="#" data-bs-toggle="modal" data-bs-target="#modalImagen{{ producto.id }}">
                    <img src="{{ producto.imagen_url }}" class="card-img-top w-100" alt="{{ producto.titulo }}" 
                        style="height: 220px; object-fit: cover; cursor: zoom-in; transition: transform 0.3s ease;">
                </a>
            </div>

        <!-- ==========================================
            VENTANA FLOTANTE (MODAL) PARA VER EN GRANDE 
            ========================================== -->
        <div class="modal fade" id="modalImagen{{ producto.id }}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <!-- El fondo transparente y sin bordes hace que la foto flote de forma muy elegante -->
                <div class="modal-content bg-transparent border-0">
                    <div class="modal-body text-center p-0 position-relative">
                
                        <!-- Imagen en tamaño completo -->
                        <img src="{{ producto.imagen_url }}" class="img-fluid rounded shadow-lg" alt="{{ producto.titulo }}" 
                        style="max-height: 85vh; border: 3px solid #fff;">
                
                    <!-- Título del producto abajo de la foto ampliada -->
                        <div class="text-white mt-2 p-2 rounded" style="background: rgba(0, 0, 0, 0.6); display: inline-block;">
                            <h5 class="m-0 fw-bold">{{ producto.titulo }}</h5>
                        </div>

                    <!-- Botón de cerrar (X) arriba a la derecha de la pantalla -->
                        <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" 
                                data-bs-dismiss="modal" aria-label="Close" style="filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));"></button>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center my-5">
            <p class="text-muted fs-5">🌸 Próximamente cargaremos los productos de esta colección. ¡Volvé prontito!</p>
            <a href="/#rubros" class="btn btn-sm btn-outline-secondary mt-2" style="border-radius:20px;">Ver otras colecciones</a>
        </div>
        {% endfor %}

    </div>
</div>
{% endblock %}
